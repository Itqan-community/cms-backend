name: CI/CD Pipeline

on:
  push:
    branches: [staging, main]


  # Allow manual deployment trigger (for hotfixes)
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - main

jobs:
  # Deployment Job with Container Cleanup
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    # Run on: direct push to staging or main, merged PRs to staging/main, or manual dispatch
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/staging') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'workflow_dispatch')

    steps:
      - name: Set deployment variables
        id: vars
        run: |
          # Robust lowercase owner for GHCR (some shells reject ${var,,})
          OWNER_LC=$(echo "$GITHUB_REPOSITORY_OWNER" | tr '[:upper:]' '[:lower:]')
          # Determine target branch
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TARGET_BRANCH="${{ github.ref_name }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            TARGET_BRANCH="${{ github.event.pull_request.base.ref }}"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_BRANCH="${{ github.ref_name }}"
          fi

          if [[ "$TARGET_BRANCH" == "staging" ]]; then
            echo "HOST=${{ secrets.STAGING_HOST }}" >> $GITHUB_ENV
            echo "ENV_NAME=staging" >> $GITHUB_ENV
            echo "ENV_URL=https://staging.api.cms.itqan.dev" >> $GITHUB_ENV
            echo "COMPOSE_FILE=deployment/docker/docker-compose.staging.yml" >> $GITHUB_ENV
            echo "BRANCH=staging" >> $GITHUB_ENV
            echo "IMAGE_REPO=ghcr.io/${OWNER_LC}/cms-backend" >> $GITHUB_ENV
            echo "IMAGE_TAG=staging-${GITHUB_SHA::7}" >> $GITHUB_ENV
          elif [[ "$TARGET_BRANCH" == "main" ]]; then
            echo "HOST=${{ secrets.PROD_HOST }}" >> $GITHUB_ENV
            echo "ENV_NAME=production" >> $GITHUB_ENV
            echo "ENV_URL=https://api.cms.itqan.dev" >> $GITHUB_ENV
            echo "COMPOSE_FILE=deployment/docker/docker-compose.production.yml" >> $GITHUB_ENV
            echo "BRANCH=main" >> $GITHUB_ENV
            echo "IMAGE_REPO=ghcr.io/${OWNER_LC}/cms-backend" >> $GITHUB_ENV
            echo "IMAGE_TAG=prod-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        run: |
          echo "🛠️ Building image $IMAGE_REPO:$IMAGE_TAG for ${{ env.ENV_NAME }} environment"
          docker build -f deployment/docker/Dockerfile.backend -t $IMAGE_REPO:$IMAGE_TAG .

          echo "📤 Pushing image to GHCR..."
          echo "🔍 Repository: $IMAGE_REPO"
          echo "🏷️ Tag: $IMAGE_TAG"

          # Make the repository public on first push (GHCR requirement)
          echo "📦 Creating/updating GHCR repository..."

          # Retry push up to 3 times with exponential backoff
          for attempt in 1 2 3; do
            echo "🔄 Push attempt $attempt/3..."
            if docker push $IMAGE_REPO:$IMAGE_TAG; then
              echo "✅ Image pushed successfully to GHCR on attempt $attempt"
              break
            else
              if [ $attempt -eq 3 ]; then
                echo "❌ All push attempts failed"
                exit 1
              fi
              wait_time=$((attempt * 10))
              echo "⏳ Waiting ${wait_time}s before retry..."
              sleep $wait_time
            fi
          done

      - name: Deploy to ${{ env.ENV_NAME }}
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "🚀 Starting deployment to ${{ env.ENV_NAME }} environment..."
            echo "📋 Target: ${{ env.ENV_URL }}"
            echo "🌿 Branch: ${{ env.BRANCH }}"

            # Navigate to application directory
            cd /srv/cms-backend

            # Pull latest changes
            echo "📥 Fetching latest code from GitHub..."
            git fetch origin ${{ env.BRANCH }}
            git reset --hard origin/${{ env.BRANCH }}

            # Display current commit
            echo "📋 Current commit: $(git rev-parse --short HEAD) - $(git log -1 --pretty=%B)"

            # Generate environment file from GitHub Secrets (per environment)
            echo "🧩 Generating environment file from secrets..."
            mkdir -p deployment/docker
            if [ "${{ env.ENV_NAME }}" = "staging" ]; then
              {
                echo "DJANGO_SETTINGS_MODULE=config.settings.staging";
                echo "SECRET_KEY=${{ secrets.STAGING_SECRET_KEY }}";
                echo "DEBUG=False";
                echo "SITE_DOMAIN=staging.api.cms.itqan.dev";
                echo "DB_ENGINE=django.db.backends.postgresql";
                echo "DB_NAME=${{ secrets.STAGING_DB_NAME }}";
                echo "DB_USER=${{ secrets.STAGING_DB_USER }}";
                echo "DB_PASSWORD=${{ secrets.STAGING_DB_PASSWORD }}";
                echo "DB_HOST=${{ secrets.STAGING_DB_HOST }}";
                echo "DB_PORT=25060";
                echo "PGSSLMODE=require";
                echo "ALLOWED_HOSTS=staging.api.cms.itqan.dev";
                echo "CORS_ALLOWED_ORIGINS=https://staging.cms.itqan.dev,http://localhost:3000";
                echo "CLOUDFLARE_R2_BUCKET=${{ secrets.STAGING_CLOUDFLARE_R2_BUCKET }}";
                echo "CLOUDFLARE_R2_ENDPOINT=${{ secrets.CLOUDFLARE_R2_ENDPOINT }}";
                echo "CLOUDFLARE_R2_ACCESS_KEY_ID=${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}";
                echo "CLOUDFLARE_R2_SECRET_ACCESS_KEY=${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}";
                echo "CLOUDFLARE_R2_PUBLIC_BASE_URL=${{ secrets.STAGING_CLOUDFLARE_R2_PUBLIC_BASE_URL }}";
                echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}";
                echo "RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}";
                echo "CELERY_BROKER_URL=amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASS }}@rabbitmq:5672//";
                echo "CELERY_RESULT_BACKEND=redis://redis:6379/0";
                echo "REDIS_URL=redis://redis:6379/1";
                echo "FLOWER_USER=${{ secrets.FLOWER_USER }}";
                echo "FLOWER_PASS=${{ secrets.FLOWER_PASS }}";
                echo "SENTRY_ENABLED=True";
                echo "SENTRY_DSN=${{ secrets.STAGING_SENTRY_DSN }}";
                echo "ENV_NAME=staging";
                echo "DEFAULT_SERVER_NAME=cms-backend-staging";
                echo "MIXPANEL_ENABLED=True";
                echo "MIXPANEL_PROJECT_TOKEN=${{ secrets.MIXPANEL_PROJECT_TOKEN }}";
                echo "MIXPANEL_PROJECT_TOKEN_2=${{ secrets.MIXPANEL_PROJECT_TOKEN_2 }}";
                echo "MIXPANEL_PROJECT_TOKEN_3=${{ secrets.MIXPANEL_PROJECT_TOKEN_3 }}";
                echo "MIXPANEL_PROJECT_TOKEN_4=${{ secrets.MIXPANEL_PROJECT_TOKEN_4 }}";
                echo "MIXPANEL_MAIN_BOARD_URL=${{ secrets.MIXPANEL_MAIN_BOARD_URL }}";
                echo "MIXPANEL_PROJECT_ID=${{ secrets.MIXPANEL_PROJECT_ID }}";
                echo "MIXPANEL_SERVICE_USERNAME=${{ secrets.MIXPANEL_SERVICE_USERNAME }}";
                echo "MIXPANEL_SERVICE_SECRET=${{ secrets.MIXPANEL_SERVICE_SECRET }}";
                echo "MIXPANEL_INGEST_HOST=${{ secrets.MIXPANEL_INGEST_HOST }}";
                echo "MIXPANEL_API_BASE=${{ secrets.MIXPANEL_API_BASE }}";
                echo "EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend";
                echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}";
                echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}";
                echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}";
                echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}";
                echo "EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}";
                echo "EMAIL_SENDER_EMAIL=${{ secrets.EMAIL_SENDER_EMAIL }}";
                echo "WEBAUTHN_RP_ID=${{ secrets.STAGING_WEBAUTHN_RP_ID }}";
                echo "ALLAUTH_JWT_PRIVATE_KEY=${{ secrets.STAGING_ALLAUTH_JWT_PRIVATE_KEY }}";
              } > deployment/docker/.env
            elif [ "${{ env.ENV_NAME }}" = "production" ]; then
              {
                echo "DJANGO_SETTINGS_MODULE=config.settings.production";
                echo "SECRET_KEY=${{ secrets.PROD_SECRET_KEY }}";
                echo "DEBUG=False";
                echo "SITE_DOMAIN=api.cms.itqan.dev";
                echo "DB_ENGINE=django.db.backends.postgresql";
                echo "DB_NAME=${{ secrets.PROD_DB_NAME }}";
                echo "DB_USER=${{ secrets.PROD_DB_USER }}";
                echo "DB_PASSWORD=${{ secrets.PROD_DB_PASSWORD }}";
                echo "DB_HOST=${{ secrets.PROD_DB_HOST }}";
                echo "DB_PORT=25060";
                echo "PGSSLMODE=require";
                echo "ALLOWED_HOSTS=api.cms.itqan.dev";
                echo "CORS_ALLOWED_ORIGINS=https://cms.itqan.dev";
                echo "CLOUDFLARE_R2_BUCKET=${{ secrets.PROD_CLOUDFLARE_R2_BUCKET }}";
                echo "CLOUDFLARE_R2_ENDPOINT=${{ secrets.CLOUDFLARE_R2_ENDPOINT }}";
                echo "CLOUDFLARE_R2_ACCESS_KEY_ID=${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}";
                echo "CLOUDFLARE_R2_SECRET_ACCESS_KEY=${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}";
                echo "CLOUDFLARE_R2_PUBLIC_BASE_URL=${{ secrets.PROD_CLOUDFLARE_R2_PUBLIC_BASE_URL }}";
                echo "EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend";
                echo "EMAIL_HOST=${{ secrets.EMAIL_HOST }}";
                echo "EMAIL_PORT=${{ secrets.EMAIL_PORT }}";
                echo "EMAIL_HOST_USER=${{ secrets.EMAIL_HOST_USER }}";
                echo "EMAIL_HOST_PASSWORD=${{ secrets.EMAIL_HOST_PASSWORD }}";
                echo "EMAIL_SENDER_NAME=${{ secrets.EMAIL_SENDER_NAME }}";
                echo "EMAIL_SENDER_EMAIL=${{ secrets.EMAIL_SENDER_EMAIL }}";
                echo "WEBAUTHN_RP_ID=${{ secrets.PROD_WEBAUTHN_RP_ID }}";
                echo "RABBITMQ_USER=${{ secrets.RABBITMQ_USER }}";
                echo "RABBITMQ_PASS=${{ secrets.RABBITMQ_PASS }}";
                echo "CELERY_BROKER_URL=amqp://${{ secrets.RABBITMQ_USER }}:${{ secrets.RABBITMQ_PASS }}@rabbitmq:5672//";
                echo "CELERY_RESULT_BACKEND=redis://redis:6379/0";
                echo "REDIS_URL=redis://redis:6379/1";
                echo "FLOWER_USER=${{ secrets.FLOWER_USER }}";
                echo "FLOWER_PASS=${{ secrets.FLOWER_PASS }}";
                echo "SENTRY_ENABLED=True";
                echo "SENTRY_DSN=${{ secrets.PROD_SENTRY_DSN }}";
                echo "ENV_NAME=production";
                echo "DEFAULT_SERVER_NAME=cms-backend-production";
                echo "ALLAUTH_JWT_PRIVATE_KEY=${{ secrets.PRODUCTION_ALLAUTH_JWT_PRIVATE_KEY }}";
              } > deployment/docker/.env
            fi
            # Append image coordinates for docker compose variable substitution
            echo "IMAGE_REPO=${{ env.IMAGE_REPO }}" >> deployment/docker/.env
            echo "IMAGE_TAG=${{ env.IMAGE_TAG }}" >> deployment/docker/.env
            echo "✅ Environment file generated at deployment/docker/.env (with IMAGE_REPO/IMAGE_TAG)"

            # Clean up existing containers and images
            echo "🧹 Cleaning up existing containers..."
            docker compose -f ${{ env.COMPOSE_FILE }} down --remove-orphans || true
            docker container prune -f || true
            docker system prune -f || true

            # Remove any conflicting containers by name (more comprehensive)
            echo "🗑️ Removing any conflicting containers..."
            docker rm -f docker-web-1 docker-caddy-1 web caddy cms-web backend || true
            docker network prune -f || true

            # Authenticate Docker to GHCR for all environments
            if [ -n "${{ secrets.GHCR_DEPLOY_USER }}" ] && [ -n "${{ secrets.GHCR_DEPLOY_TOKEN }}" ]; then
              echo "🔐 Logging in to GHCR on remote host for ${{ env.ENV_NAME }} environment..."
              echo "${{ secrets.GHCR_DEPLOY_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_DEPLOY_USER }}" --password-stdin || {
                echo "❌ GHCR login failed on remote host"; exit 1; }
            else
              echo "⚠️ GHCR_DEPLOY_USER/TOKEN not set; using GitHub token for ${{ env.ENV_NAME }} environment"
              echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin || {
                echo "❌ GHCR login failed with GitHub token"; exit 1; }
            fi

            # Deploy with Docker Compose (pull and start)
            echo "🔧 Pulling and starting services..."
            IMG_REPO='${{ env.IMAGE_REPO }}'
            IMG_TAG='${{ env.IMAGE_TAG }}'
            echo "Using image: ${IMG_REPO}:${IMG_TAG}"

            # Pull fresh image from GHCR for all environments
            echo "📦 Pulling fresh image from GHCR for ${{ env.ENV_NAME }} environment..."
            IMAGE_REPO="${IMG_REPO}" IMAGE_TAG="${IMG_TAG}" docker compose -f ${{ env.COMPOSE_FILE }} pull
            IMAGE_REPO="${IMG_REPO}" IMAGE_TAG="${IMG_TAG}" docker compose -f ${{ env.COMPOSE_FILE }} up -d

            # Note: python manage.py compilemessages --locale ar is run automatically in entrypoint.sh
            # and during docker build in Dockerfile.backend

            # Wait for services to be ready
            echo "⏳ Waiting for services to start..."
            sleep 30

            # Health check
            echo "🔍 Performing health check..."
            if curl -f -s ${{ env.ENV_URL }}/health > /dev/null; then
              echo "✅ Health check passed!"
            else
              echo "⚠️ Health check failed, checking container status..."
              docker compose -f ${{ env.COMPOSE_FILE }} ps
              docker compose -f ${{ env.COMPOSE_FILE }} logs web --tail 20
            fi

            # Clean up old Docker images
            echo "🧹 Cleaning up old Docker images..."

            # Remove dangling images
            docker image prune -f || true

            # Remove old CMS images, keeping only the 3 most recent for rollback
            echo "📦 CMS images before cleanup: $(docker images 'ghcr.io/*/cms-backend' -q | wc -l)"
            docker images "ghcr.io/*/cms-backend" --format "{{.ID}} {{.CreatedAt}}" | \
              sort -k2,3 -r | tail -n +4 | awk '{print $1}' | \
              xargs -r docker rmi -f 2>/dev/null || true
            echo "📦 CMS images after cleanup: $(docker images 'ghcr.io/*/cms-backend' -q | wc -l)"

            # Remove old caddy images, keeping 2 recent
            docker images "caddy" --format "{{.ID}} {{.CreatedAt}}" | \
              sort -k2,3 -r | tail -n +3 | awk '{print $1}' | \
              xargs -r docker rmi -f 2>/dev/null || true

            # Final cleanup of orphaned layers
            docker system prune -f || true

            echo "🎉 Deployment to ${{ env.ENV_NAME }} completed successfully!"
            echo "🌐 Application URL: ${{ env.ENV_URL }}"

      - name: Notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ SLACK_DEPLOY_WEBHOOK secret not set, skipping notification"
            exit 0
          fi

          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if [ -z "$COMMIT_MSG" ]; then
            COMMIT_MSG=$(git log -1 --pretty=%s)
          fi

          if [ "${{ job.status }}" = "success" ]; then
            EMOJI=":white_check_mark:"
            STATUS="Deployed"
          else
            EMOJI=":x:"
            STATUS="Failed"
          fi

          ENV_LABEL=$(echo "${{ env.ENV_NAME }}" | tr '[:lower:]' '[:upper:]')

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{
              \"blocks\": [
                {
                  \"type\": \"section\",
                  \"text\": {
                    \"type\": \"mrkdwn\",
                    \"text\": \"${EMOJI} *[${ENV_LABEL}] CMS Backend ${STATUS}*\n\n:link: <${{ env.ENV_URL }}/admin/|View Admin>\n:seedling: Branch: \`${{ env.BRANCH }}\`\n:package: Commit: \`${GITHUB_SHA::7}\`\n:memo: ${COMMIT_MSG}\n:bust_in_silhouette: By: ${{ github.actor }}\"
                  }
                }
              ]
            }"
