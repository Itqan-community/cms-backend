x-common-env: &common-env
  DJANGO_SETTINGS_MODULE: config.settings.development
  PYTHONUNBUFFERED: "1"
  EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/itqan
  DB_ENGINE: django.db.backends.postgresql
  DB_NAME: itqan
  DB_USER: postgres
  DB_PASSWORD: postgres
  DB_HOST: postgres
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  CELERY_BROKER_URL: amqp://guest:guest@rabbitmq:5672//
  CELERY_RESULT_BACKEND: redis://redis:6379/0

services:
  django:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
      args:
        DEPENDENCY_GROUP: dev
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uv run python manage.py runserver 0.0.0.0:8000

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: itqan
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  celery-worker:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
      args:
        DEPENDENCY_GROUP: dev
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uv run celery -A config worker -l info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}

  celery-beat:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
      args:
        DEPENDENCY_GROUP: dev
    env_file:
      - .env
    environment:
      <<: *common-env
    volumes:
      - .:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    command: uv run celery -A config beat -l info

  flower:
    build:
      context: .
      dockerfile: deployment/docker/Dockerfile.backend
      args:
        DEPENDENCY_GROUP: dev
    env_file:
      - .env
    environment:
      <<: *common-env
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    depends_on:
      rabbitmq:
        condition: service_healthy
    command: uv run celery -A config flower --port=5555 --broker_api=http://guest:guest@rabbitmq:15672/api/

volumes:
  postgres_data:
  rabbitmq_data:
